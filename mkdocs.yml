#info(信息),banality(陈词滥调)
site_name: xinchen-sea's banality
site_author: xinchen-sea
site_description: 喜欢螺旋式上升的陈词滥调
# site_url: "https://www.xinchen-sea.com"

# repository(库) information
repo_name: 'xinchen-sea/nonsense'
repo_url: 'https://github.com/xinchen-sea/xinchen-sea.github.io'


theme:
  name: material
  language: 'zh'
  logo: assets/bql.ico
  favicon: assets/bql.ico    #网站图标
  #调色板
  palette:
    # Palette（调色板） toggle for light mode(浅色模式)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

     # Palette toggle for dark mode（深色模式）
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    logo: material/library
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
  #字体
  font: 
    text: Roboto
    code: Roboto Mono
  alternate:
    - name: English
       link: /en/ 
       lang: en
    - name: Chinese
       link: /zh/
       lang: zh




  

nav:
  - Home: index.md
  - About: about.md
