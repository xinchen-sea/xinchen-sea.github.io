#cookie
extra:
  consent:
    title: Cookie consent
    description: >- 
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
    analytics: Custom name
    actions:
      - accept
      - manage

#插件
plugins:
  - privacy
  - search

theme:
  name: material
  language: 'zh'
  custom_dir: overrides
  logo: assets/bql.ico   #logo
  favicon: assets/bql.ico    #网站图标
  # 调色板
  palette:
    # Palette（调色板） toggle for light mode(浅色模式)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode（深色模式）
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  #一些标签图标
  icon:
    logo: material/library
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16

  #字体
  font: 
    text: Roboto
    code: Roboto Mono

  features:
    # 导航栏功能
    - navigation.instant
    - navigation.instant.prefetch  # 即时预取
    - navigation.tracking          # 锚点追踪
    - toc.follow                   # 锚点跟随
    - toc.integrate                # 目录混合
    - navigation.tabs              # 导航选项卡
  #  - header.autohide              # 滑动隐藏标题
    - navigation.expand            # 导航拓展，默认展开可折叠字部份
    - navigation.top               # 提供回到页面顶部的按钮
    - navigation.footer            # 在页面底部显示导航链接
    - navigation.path              # 显示导航路径
    - navigation.indexes           # 带有章节索引页
   
    # 搜索设置
    - search.highlight      # 搜索突出显示
    - search.suggest        # 搜索建议
    - search.share          # 搜索共享
    
 


extra:
  # 语言切换
  alternate:
    - name: English
      link: /en/ 
      lang: en
    - name: Chinese
      link: /zh/
      lang: zh


extra_css:
  - 'assets/css/table.css'   # 表格设置
  - 'assets/css/fonts.css'   # 字体设置
  - 'assets/css/custom.css'

markdown_extensions:
  # 基础Markdown扩展
  - abbr             # 支持缩写
  - admonition       # 支持警告框
  - attr_list        # 允许为Markdown元素添加HTML属性
  - def_list         # 支持定义列表
  - footnotes        # 支持脚注
  - md_in_html       # 允许在HTML块中使用Markdown
  - tables           # 支持表格

nav:
  - Home: index.md
  - 驾校:
    - drivinglicense/index.md
    - 科目一: drivinglicense/object1.md
    - 科目二、三: drivinglicense/object2&3.md
    - 科目四: drivinglicense/object4.md







