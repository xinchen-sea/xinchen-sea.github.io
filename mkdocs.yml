#cookie
extra:
  consent:
    title: Cookie consent
    description: >- 
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
    analytics: Custom name
    actions:
      - accept
      - manage

#插件
plugins:
  - privacy
  - search

theme:
  name: material
  language: 'zh'
  #custom_dir: overrides
  logo: assets/bql.ico   #logo
  favicon: assets/bql.ico    #网站图标
  # 调色板
  palette:
    # Palette（调色板） toggle for light mode(浅色模式)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode（深色模式）
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  #一些标签图标
  icon:
    logo: material/library
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16

  #字体
  font: 
    text: Roboto
    code: Roboto Mono

  features:
    # 导航栏功能
    - navigation.instant
    - navigation.instant.prefetch  # 即时预取
    - navigation.tracking          # 锚点追踪
    - toc.follow                   # 锚点跟随
  #  - toc.integrate                # 目录混合
    - navigation.tabs              # 导航选项卡
  #  - header.autohide              # 滑动隐藏标题
    - navigation.expand            # 导航拓展，默认展开可折叠字部份
    - navigation.top               # 提供回到页面顶部的按钮
    - navigation.footer            # 在页面底部显示导航链接
    - navigation.path              # 显示导航路径
    - navigation.indexes           # 带有章节索引页
   
    # 搜索设置
    - search.highlight      # 搜索突出显示
    - search.suggest        # 搜索建议
    - search.share          # 搜索共享
    
 
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com
    - icon: fontawesome/solid/rss
      link: none
    - icon: material/forum
      link: https://www.cc98.org
    - icon: fontawesome/solid/home
      link: https://xinchen-sea.github.io/

extra:
  # 语言切换
  alternate:
    - name: English
      link: /en/ 
      lang: en
    - name: Chinese
      link: /zh/
      lang: zh


extra_css:
  - 'assets/css/table.css'   # 表格设置
  - 'assets/css/fonts.css'   # 字体设置
  - 'assets/css/custom.css'  # 外观设置

markdown_extensions:
  # 基础Markdown扩展
  - abbr             # 支持缩写
  - footnotes        # 支持脚注
  - tables           # 支持表格
  - toc:
      permalink: true  # 添加目录中的永久链接
      toc_depth: 4     # 设置目录的深度为4级
  - meta  # 处理元数据
  - def_list  # 启用定义列表
  - attr_list  # 启用属性列表
  - md_in_html  # 支持在HTML中使用Markdown语法
  - sane_lists  # 对列表的更合理解析
  - admonition  # 启用警告框和注意事项的语法
  - pymdownx.keys  # 启用键盘键符号的语法扩展
  - pymdownx.mark  # 启用标记的语法扩展
  - pymdownx.tilde  # 启用波浪线的语法扩展
  - pymdownx.critic  # 启用评论模式的语法扩展
  - pymdownx.details  # 启用细节块的语法扩展
  - pymdownx.snippets  # 启用代码片段的语法扩展
  - pymdownx.magiclink  # 启用自动链接识别的语法扩展
  - pymdownx.superfences  # 启用高级代码块的语法扩展
  - pymdownx.inlinehilite  # 启用内联代码高亮的语法扩展
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji  # 指定使用Twemoji作为表情符号索引
      emoji_generator: !!python/name:materialx.emoji.to_svg  # 指定使用SVG格式生成表情符号
  - pymdownx.tabbed:
      alternate_style: true  # 启用选项卡式组件，并使用替代样式
  - pymdownx.tasklist:
      custom_checkbox: true  # 启用自定义复选框样式
  - pymdownx.highlight:
      anchor_linenums: true  # 启用代码高亮行号锚点
  - pymdownx.arithmatex:
      generic: true  # 启用数学公式支持，并使用通用渲染器





nav:
  - Home: index.md
  - 驾校:
    - drivinglicense/index.md
    - 科目一: drivinglicense/object1.md
    - 科目二、三: drivinglicense/object2&3.md
    - 科目四: drivinglicense/object4.md







